name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=src/core --cov=src/services --cov=src/utils --cov-report=term-missing --cov-fail-under=70

      - name: Download FFmpeg and yt-dlp
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile resources/bin/yt-dlp.exe
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          Copy-Item (Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName resources/bin/ffmpeg.exe

      - name: Build executable
        run: python scripts/build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: .\scripts\build_installer.ps1

      - name: Package portable folder
        shell: pwsh
        run: |
          $line = Get-Content src/version.py | Where-Object { $_ -like '*__version__*' } | Select-Object -First 1
          if ($line -match '__version__\s*=\s*"(.+?)"') {
            $version = $Matches[1]
          } else {
            throw "Could not read __version__ from src/version.py"
          }
          Compress-Archive -Path dist/MediaFetch -DestinationPath "dist/MediaFetch-$version-win64.zip" -Force

      - name: Prepare release notes
        shell: pwsh
        id: release_meta
        run: |
          $line = Get-Content src/version.py | Where-Object { $_ -like '*__version__*' } | Select-Object -First 1
          if ($line -match '__version__\s*=\s*"(.+?)"') {
            $version = $Matches[1]
          } else {
            throw "Could not read __version__ from src/version.py"
          }
          $setup = Get-ChildItem dist/MediaFetch-*-Setup.exe | Select-Object -First 1
          if (-not $setup) { throw "Setup exe not found in dist/" }
          $sha256 = (Get-FileHash $setup.FullName -Algorithm SHA256).Hash.ToLower()
          $body = @"
          ## MediaFetch $version

          First public release for Windows 10/11.

          ### Downloads
          - **Installer:** MediaFetch-$version-Setup.exe (recommended)
          - **Portable:** MediaFetch-$version-win64.zip

          ### Features
          - YouTube, Instagram, TikTok downloads
          - Queue, history, DE/EN UI, dark/light theme
          - Bundled FFmpeg + yt-dlp (One-Dir layout)

          SHA256: $sha256
          "@.Trim()
          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_meta.outputs.body }}
          files: |
            dist/MediaFetch-*-win64.zip
            dist/MediaFetch-*-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
